<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Viewer PDF Django</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
        .pdf-container { width: 80%; margin: 20px auto; border: 2px solid #ccc; }
        iframe { width: 100%; height: 600px; border: none; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Viewer PDF Platform Django</h2>
    
    <a href="{% url 'buka_pdf_file' %}" target="_blank" class="btn">Buka PDF di Tab Baru</a>

    <div class="pdf-container">
        <h3>Preview PDF di Dalam Halaman:</h3>
        <iframe src="{% url 'buka_pdf_file' %}"></iframe>
    </div>

</body>
</html>
